<style>
    body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .background {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('https://media.discordapp.net/attachments/1486604534959706212/1487524856537813032/IMG_2216.gif?ex=69c974fa&is=69c8237a&hm=686237257c71a181be41b4731ebead3d7de503bd9042c9c62326d5426212a31f&=') center/cover no-repeat;
        filter: blur(8px) brightness(0.4);
        z-index: -1;
    }

    h1 {
        margin-top: 50px;
        font-size: 40px;
        letter-spacing: 2px;
    }

    .avatars {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        gap: 30px;
        justify-content: center;
        margin-top: 40px;
    }

    .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.2);
        transition: 0.3s;
    }

    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .avatar:hover {
        transform: scale(1.1);
        border-color: white;
    }

    .music-player {
        margin-top: 60px;
        background: rgba(255,255,255,0.05);
        padding: 15px 20px;
        border-radius: 15px;
        display: inline-flex;
        align-items: center;
        gap: 15px;
        backdrop-filter: blur(10px);
    }

    .music-player img {
        width: 50px;
        height: 50px;
        border-radius: 10px;
    }

    audio {
        outline: none;
    }
</style>
</head>
